services:

  # ─── PHP Apps ────────────────────────────────────────────────
  app_projeto1:
    build:
      context: ./docker/php
    container_name: laravel_app_projeto1
    working_dir: /var/www/projeto1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./projects/projeto1:/var/www/projeto1
    depends_on:
      - mysql
      - postgres
      - redis
    networks:
      - laravel

  app_projeto2:
    build:
      context: ./docker/php
    container_name: laravel_app_projeto2
    working_dir: /var/www/projeto2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./projects/projeto2:/var/www/projeto2
    depends_on:
      - mysql
      - postgres
      - redis
    networks:
      - laravel

  # ─── Nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8080:8080"   # projeto1
      - "8090:8090"   # projeto2
    volumes:
      - ./projects/projeto1:/var/www/projeto1
      - ./projects/projeto2:/var/www/projeto2
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app_projeto1
      - app_projeto2
    networks:
      - laravel

  # ─── Databases ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel

  postgres:
    image: postgres:16-alpine
    container_name: laravel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-laravel}
      POSTGRES_USER: ${POSTGRES_USER:-laravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel

  # ─── Tools ───────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - laravel

  pgadmin:
    image: dpage/pgadmin4
    container_name: laravel_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "8082:80"
    depends_on:
      - postgres
    networks:
      - laravel

  redis:
    image: redis:alpine
    container_name: laravel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel

  mailhog:
    image: mailhog/mailhog
    container_name: laravel_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - laravel

volumes:
  mysql_data:
  postgres_data:
  redis_data:

networks:
  laravel:
    driver: bridge
